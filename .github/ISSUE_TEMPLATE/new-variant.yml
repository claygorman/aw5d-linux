name: New device variant
description: Report an AW5-family cooler that isn't confirmed yet (or doesn't work)
title: "[variant] "
labels: ["hardware-variant"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping widen hardware support! Only `3402:0407` ("CoolerMaster")
        is confirmed today. A couple of quick commands tell us everything we need.
  - type: input
    id: lsusb
    attributes:
      label: lsusb line
      description: "Output of: `lsusb | grep -i 3402`  (or the full line for your cooler)"
      placeholder: "Bus 001 Device 005: ID 3402:0406 iBUYPOWER LiquidCooling(AW5)"
    validations:
      required: true
  - type: dropdown
    id: detected
    attributes:
      label: Does `python3 aw5d_lcd.py --list` detect it?
      options:
        - "Yes"
        - "No"
        - "Haven't tried"
    validations:
      required: true
  - type: dropdown
    id: works
    attributes:
      label: Does the gauge light up with the correct temperature?
      options:
        - "Yes — works"
        - "Lights up but wrong/garbled values"
        - "No / crashes / stays dark"
        - "Haven't tried"
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: "Distro + kernel, CPU, and any output from `python3 aw5d_lcd.py --once --verbose`"
      render: shell
    validations:
      required: false
